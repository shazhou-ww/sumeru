# Prototype manifest — validated by validateManifest() in packages/host/src/config.ts.
# Schema: name (non-empty), model{provider,name,apiKey,contextWindow}, instructions, skills?
# Prototype map key is the DIRECTORY name (echo-worker); manifest.name is the adapter label.
name: echo-worker

model:
  # provider: "anthropic" | "openai" | "openrouter" | { baseUrl, apiType: openai|anthropic }
  provider: anthropic
  name: claude-sonnet-4
  apiKey: ${ANTHROPIC_API_KEY}
  contextWindow: 200000

instructions: |
  You are a minimal echo worker. Repeat the user's message back to them.

# skills is optional; when present each entry maps to skills/<name>/SKILL.md at init time.
skills: []
