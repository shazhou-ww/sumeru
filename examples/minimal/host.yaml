# Sumeru v3 — minimal Host config.
# Loaded by packages/host/src/config.ts -> loadHostConfig(<rootDir>).
name: minimal-host

maxRunning: 4
workspaceRoot: /home/azureuser/repos
envFile: ~/.config/sumeru/.env

models:
  anthropic:
    baseUrl: null
    apiKey: ${ANTHROPIC_API_KEY:-test-key}
  openai: null
  openrouter: null

resourceLimits:
  maxCpu: 2
  maxMemory: 2g

defaults:
  timeout: 7200000
  maxTurns: 40
  resources:
    cpu: 1
    memory: 2g
