name: sumeru@kuma

# Optional: instance workspace root. When set, per-session `config.cwd`
# values are resolved against this path (and confined within it). Omit
# or set to "" to disable — clients must then send absolute `cwd`s.
# workspaceRoot: /home/azureuser/repos

gateways:
  codex:
    adapter: codex
    config:
      sendTimeoutMs: 1800000        # 30 min
      createSessionTimeoutMs: 300000 # 5 min
      maxTurns: 120
    capabilities:
      resume: true
      streaming: true

  claude-code:
    adapter: claude-code
    config:
      sendTimeoutMs: 1800000
      createSessionTimeoutMs: 300000
      maxTurns: 120
    capabilities:
      resume: true
      streaming: true

  hermes:
    adapter: hermes
    capabilities:
      resume: true
      streaming: true
