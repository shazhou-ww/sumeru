name: "provider CRUD lifecycle"
description: |
  Provider CRUD 全流程：add → get → update → list → rm → get 404 → rm 被引用 409。
  覆盖 SCENARIOS: 6.1-6.6。

setup:
  - "sumeru provider rm atest-provider 2>/dev/null; true"
  - "sumeru model rm atest-model 2>/dev/null; true"

teardown:
  - "sumeru model rm atest-model 2>/dev/null; true"
  - "sumeru provider rm atest-provider 2>/dev/null; true"

steps:
  # ─── 6.3 add ───

  - command: 'sumeru provider add atest-provider --api-type openai --base-url "https://example.com/v1" 2>&1'
    judge:
      type: regex
      expr: "Created provider atest-provider"

  # ─── 6.2 get ───

  - command: "sumeru provider get atest-provider 2>&1 | head -10"
    judge:
      type: regex
      expr: "Name: atest-provider"

  # ─── 6.4 update ───

  - command: 'sumeru provider update atest-provider --base-url "https://updated.com/v1" 2>&1'
    judge:
      type: regex
      expr: "Updated provider atest-provider"

  # ─── 6.1 list ───

  - command: "sumeru provider list 2>&1 | head -10"
    judge:
      type: regex
      expr: "atest-provider"

  # ─── 6.6 rm 被引用 → 409 ───

  - command: "sumeru model add atest-model --provider atest-provider --model test-model 2>&1"
    judge:
      type: regex
      expr: "Created model atest-model"

  - command: "sumeru provider remove atest-provider 2>&1; true"
    judge:
      type: llm
      prompt: "输出应包含 error，提示 provider in use 或被 model 引用"

  # ─── 6.5 rm 成功（先删 model）───

  - command: "sumeru model remove atest-model 2>&1"
    judge:
      type: regex
      expr: "Removed model atest-model"

  - command: "sumeru provider remove atest-provider 2>&1"
    judge:
      type: regex
      expr: "Removed provider atest-provider"

  # ─── get 404 ───

  - command: "sumeru provider get atest-provider 2>&1; true"
    judge:
      type: llm
      prompt: "输出应包含 error，提示 provider not found"
