name: persona-crud-lifecycle
description: |
  验证 Persona 的创建、列出、获取功能。
  覆盖 SCENARIOS: 6.1, 6.2, 6.3

setup: []

teardown:
  - "sumeru persona rm atest-persona 2>/dev/null || true"

steps:
  - name: "创建 Persona"
    command: "sumeru persona add atest-persona --instructions 'You are a helpful assistant.' 2>&1"
    expect: "Persona 'atest-persona' added"

  - name: "列出所有 Personas"
    command: "sumeru persona list 2>&1"
    expect: "atest-persona"

  - name: "获取 Persona 详情"
    command: "sumeru persona get atest-persona 2>&1"
    expect: "helpful assistant"

  - name: "验证 JSON 格式输出"
    command: "sumeru persona get atest-persona --format json 2>&1 | jq -r '.instructions'"
    expect: "helpful assistant"
