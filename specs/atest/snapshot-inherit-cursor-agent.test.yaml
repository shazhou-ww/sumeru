name: snapshot-inherit-cursor-agent
description: |
  验证 cursor-agent 适配器的 snapshot 继承功能。
  创建 session -> snapshot -> 从 snapshot 创建新 session -> 验证继承

setup:
  - sumeru prototype add atest-cursor-agent --adapter cursor-agent --model claude-sonnet-4 2>/dev/null || true

teardown:
  - sumeru session rm $SID_BASE $SID_SKIP $SID_RESET 2>/dev/null || true
  - sumeru prototype rm atest-cursor-agent atest-cursor-agent-snap 2>/dev/null || true
  - docker rmi sumeru/atest-cursor-agent-snap:dev 2>/dev/null || true

steps:
  - name: "创建 base session 并注入 secret"
    command: "sumeru session add atest-cursor-agent --task 'Remember this secret code: DELTA-3388. Reply OK.'"
    judge:
      type: regex
      expr: "Session .* created"

  - name: "提取 base session ID"
    command: "export SID_BASE=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_BASE"
    judge:
      type: regex
      expr: "ses_"

  - name: "等待回复"
    command: "sleep 15 && sumeru session turns $SID_BASE 2>&1"
    judge:
      type: regex
      expr: "OK"

  - name: "创建 snapshot"
    command: "sumeru session snapshot $SID_BASE atest-cursor-agent-snap"
    judge:
      type: regex
      expr: "Snapshot created"

  - name: "验证 snapshot image 存在"
    command: "docker images | grep atest-cursor-agent-snap"
    judge:
      type: regex
      expr: "atest-cursor-agent-snap"

  - name: "创建 snapshot prototype"
    command: "sumeru prototype add atest-cursor-agent-snap --adapter cursor-agent --model claude-sonnet-4 --image sumeru/atest-cursor-agent-snap:dev"
    judge:
      type: regex
      expr: "Prototype .* created"

  - name: "从 snapshot 创建新 session (--skip-reset 继承上下文)"
    command: "sumeru session add atest-cursor-agent-snap --skip-reset --task 'What is the secret code?'"
    judge:
      type: regex
      expr: "Session .* created"

  - name: "提取 skip-reset session ID"
    command: "export SID_SKIP=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_SKIP"
    judge:
      type: regex
      expr: "ses_"

  - name: "验证继承的上下文包含 secret code"
    command: "sleep 15 && sumeru session turns $SID_SKIP 2>&1"
    judge:
      type: regex
      expr: "DELTA-3388"

  - name: "从 snapshot 创建新 session (默认 reset 不继承上下文)"
    command: "sumeru session add atest-cursor-agent-snap --task 'What is the secret code?'"
    judge:
      type: regex
      expr: "Session .* created"

  - name: "提取 reset session ID"
    command: "export SID_RESET=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_RESET"
    judge:
      type: regex
      expr: "ses_"

  - name: "验证不继承上下文 (回复不应包含 secret code)"
    command: "sleep 15 && sumeru session turns $SID_RESET 2>&1"
    judge:
      type: regex
      expr: "don't know|not sure|no idea"
