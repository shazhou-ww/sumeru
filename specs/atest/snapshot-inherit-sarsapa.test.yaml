name: snapshot-inherit-sarsapa
description: |
  验证 sarsapa 适配器的 snapshot 继承功能。
  创建 session -> snapshot -> 从 snapshot 创建新 session -> 验证继承

setup:
  - sumeru prototype add atest-sarsapa --adapter sarsapa --model qwen3.7-max 2>/dev/null || true

teardown:
  - sumeru session rm $SID_BASE $SID_SKIP $SID_RESET 2>/dev/null || true
  - sumeru prototype rm atest-sarsapa atest-sarsapa-snap 2>/dev/null || true
  - docker rmi sumeru/atest-sarsapa-snap:dev 2>/dev/null || true

steps:
  - name: "创建 base session 并注入 secret"
    command: "sumeru session add atest-sarsapa --task 'Remember this secret code: DELTA-3388. Reply OK.'"
    expect: "Session .* created"

  - name: "提取 base session ID"
    command: "export SID_BASE=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_BASE"
    expect: "ses_"

  - name: "等待回复"
    command: "sleep 8 && sumeru session turns $SID_BASE 2>&1"
    expect: "OK"

  - name: "创建 snapshot"
    command: "sumeru session snapshot $SID_BASE atest-sarsapa-snap"
    expect: "Snapshot created"

  - name: "验证 snapshot image 存在"
    command: "docker images | grep atest-sarsapa-snap"
    expect: "atest-sarsapa-snap"

  - name: "创建 snapshot prototype"
    command: "sumeru prototype add atest-sarsapa-snap --adapter sarsapa --model qwen3.7-max --image sumeru/atest-sarsapa-snap:dev"
    expect: "Prototype .* created"

  - name: "从 snapshot 创建新 session (--skip-reset 继承上下文)"
    command: "sumeru session add atest-sarsapa-snap --skip-reset --task 'What is the secret code?'"
    expect: "Session .* created"

  - name: "提取 skip-reset session ID"
    command: "export SID_SKIP=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_SKIP"
    expect: "ses_"

  - name: "验证继承的上下文包含 secret code"
    command: "sleep 8 && sumeru session turns $SID_SKIP 2>&1"
    expect: "DELTA-3388"

  - name: "从 snapshot 创建新 session (默认 reset 不继承上下文)"
    command: "sumeru session add atest-sarsapa-snap --task 'What is the secret code?'"
    expect: "Session .* created"

  - name: "提取 reset session ID"
    command: "export SID_RESET=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_RESET"
    expect: "ses_"

  - name: "验证不继承上下文 (回复不应包含 secret code)"
    command: "sleep 8 && sumeru session turns $SID_RESET 2>&1"
    expect: "don't know|not sure|no idea"
