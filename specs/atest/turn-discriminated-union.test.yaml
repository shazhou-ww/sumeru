name: turn-discriminated-union
description: |
  Test that turns have different structures for assistant vs tool.
  Covers scenario 5.3.

setup:
  - "sumeru prototype add atest-sarsapa --adapter sarsapa --model qwen3.7-max 2>/dev/null || true"
  - "mkdir -p ~/.sumeru/workspace/atest-proj"
  - "echo 'test file' > ~/.sumeru/workspace/atest-proj/test.txt"

teardown:
  - "sumeru prototype remove atest-sarsapa 2>/dev/null || true"
  - "rm -rf ~/.sumeru/workspace/atest-proj"

steps:
  - name: "Create session and extract ID"
    command: 'export SID=$(sumeru session add atest-sarsapa --project atest-proj --task "List files in current directory" 2>&1 | grep -oP "ses_[A-Z0-9]+" | head -1) && echo "SID=$SID"'
    expect: "SID=ses_"
    
  - name: "Get turns and check structure"
    command: "sleep 10 && sumeru session turns $SID --format json 2>&1 | head -50"
    expect: "role"
