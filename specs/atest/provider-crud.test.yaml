name: provider-crud
description: Test Provider CRUD operations (6.1-6.5)
setup:
  - "sumeru provider remove test-provider 2>/dev/null || true"
teardown:
  - "sumeru provider remove test-provider 2>/dev/null || true"
  - "sumeru provider remove test-provider-2 2>/dev/null || true"
steps:
  - name: "6.1: 列出所有 Provider"
    command: "sumeru provider list 2>&1"
    judge:
      type: regex
      expr: "Provider"
  
  - name: "6.2: 创建 Provider"
    command: "sumeru provider add test-provider --api-type openai --base-url https://api.example.com 2>&1"
    judge:
      type: regex
      expr: "Created provider"
  
  - name: "6.2: 验证创建结果"
    command: "sumeru provider get test-provider --format json 2>&1"
    judge:
      type: regex
      expr: "test-provider"
  
  - name: "6.3: 按名称获取 Provider"
    command: "sumeru provider get test-provider 2>&1"
    judge:
      type: regex
      expr: "test-provider"
  
  - name: "6.3: 验证 Provider 属性"
    command: "sumeru provider get test-provider --format json 2>&1 | jq -r '.apiType'"
    judge:
      type: regex
      expr: "openai"
  
  - name: "6.2: 创建第二个 Provider"
    command: "sumeru provider add test-provider-2 --api-type anthropic --base-url https://api.anthropic.com 2>&1"
    judge:
      type: regex
      expr: "Created provider"
  
  - name: "6.1: 验证列表包含两个 Provider"
    command: "sumeru provider list --format json 2>&1 | jq -r '.[].name' | grep -E 'test-provider|test-provider-2' | wc -l"
    judge:
      type: regex
      expr: "2"
  
  - name: "6.4: 更新 Provider"
    command: "sumeru provider update test-provider --base-url https://api.updated.com 2>&1"
    judge:
      type: regex
      expr: "Updated provider"
  
  - name: "6.4: 验证更新结果"
    command: "sumeru provider get test-provider --format json 2>&1 | jq -r '.baseUrl'"
    judge:
      type: regex
      expr: "https://api.updated.com"
  
  - name: "6.5: 删除 Provider"
    command: "sumeru provider remove test-provider 2>&1"
    judge:
      type: regex
      expr: "Removed provider"
  
  - name: "6.5: 验证删除结果"
    command: "sumeru provider get test-provider 2>&1 || echo 'Delete verified'"
    judge:
      type: regex
      expr: "Delete verified"
  
  - name: "6.5: 清理第二个 Provider"
    command: "sumeru provider remove test-provider-2 2>&1"
    judge:
      type: regex
      expr: "Removed provider"
