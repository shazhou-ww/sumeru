name: snapshot-inherit-claude-code
description: |
  验证 claude-code 适配器的 snapshot 继承功能。
  创建 session -> snapshot -> 从 snapshot 创建新 session -> 验证继承

setup:
  - sumeru provider add test-anthropic --api-type anthropic --base-url http://127.0.0.1:4142 --api-key dummy 2>/dev/null || true
  - sumeru model add claude-sonnet-4.5 --provider test-anthropic --model claude-sonnet-4.5 2>/dev/null || true
  - sumeru prototype add atest-claude-code --adapter claude-code --model claude-sonnet-4.5 2>/dev/null || true

teardown:
  - sumeru session rm $SID_BASE $SID_SKIP $SID_RESET 2>/dev/null || true
  - sumeru prototype rm atest-claude-code atest-claude-code-snap 2>/dev/null || true
  - sumeru model rm claude-sonnet-4.5 2>/dev/null || true
  - sumeru provider rm test-anthropic 2>/dev/null || true
  - docker rmi sumeru/atest-claude-code-snap:dev 2>/dev/null || true

steps:
  - name: "创建 base session 并注入 secret"
    command: "sumeru session add atest-claude-code --task 'Remember this secret code: DELTA-3388. Reply OK.'"
    expect: "Session .* created"

  - name: "提取 base session ID"
    command: "export SID_BASE=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_BASE"
    expect: "ses_"

  - name: "等待回复"
    command: "sleep 10 && sumeru session turns $SID_BASE 2>&1"
    expect: "OK"

  - name: "创建 snapshot"
    command: "sumeru session snapshot $SID_BASE atest-claude-code-snap"
    expect: "Snapshot created"

  - name: "验证 snapshot image 存在"
    command: "docker images | grep atest-claude-code-snap"
    expect: "atest-claude-code-snap"

  - name: "创建 snapshot prototype"
    command: "sumeru prototype add atest-claude-code-snap --adapter claude-code --model claude-sonnet-4.5 --image sumeru/atest-claude-code-snap:dev"
    expect: "Prototype .* created"

  - name: "从 snapshot 创建新 session (--skip-reset 继承上下文)"
    command: "sumeru session add atest-claude-code-snap --skip-reset --task 'What is the secret code?'"
    expect: "Session .* created"

  - name: "提取 skip-reset session ID"
    command: "export SID_SKIP=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_SKIP"
    expect: "ses_"

  - name: "验证继承的上下文包含 secret code"
    command: "sleep 10 && sumeru session turns $SID_SKIP 2>&1"
    expect: "DELTA-3388"

  - name: "从 snapshot 创建新 session (默认 reset 不继承上下文)"
    command: "sumeru session add atest-claude-code-snap --task 'What is the secret code?'"
    expect: "Session .* created"

  - name: "提取 reset session ID"
    command: "export SID_RESET=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID_RESET"
    expect: "ses_"

  - name: "验证不继承上下文 (回复不应包含 secret code)"
    command: "sleep 10 && sumeru session turns $SID_RESET 2>&1"
    expect: "don't know|not sure|no idea"
