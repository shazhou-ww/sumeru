name: "session with project directory"
description: |
  验证 --project 参数：项目目录挂载到 /workspace，adapter 能读取项目文件。
  覆盖 SCENARIOS: 2.1, 2.3。
  资源命名加 atest- 前缀避免冲突。

setup:
  - "mkdir -p ~/.sumeru/workspace/atest-project"
  - "printf 'The secret code is OMEGA-5599\\n' > ~/.sumeru/workspace/atest-project/README.md"
  - "sumeru prototype rm atest-sarsapa 2>/dev/null; true"
  - "sumeru prototype add atest-sarsapa --adapter sarsapa --model qwen3.7-max"

teardown:
  - "sumeru session rm $SID 2>/dev/null; true"
  - "sumeru prototype rm atest-sarsapa 2>/dev/null; true"
  - "rm -rf ~/.sumeru/workspace/atest-project"

steps:
  # ─── 创建带 --project 的 session ───

  - name: "创建 session"
    command: "sumeru session add atest-sarsapa --project atest-project --task \"Read README.md and tell me the secret code inside\""
    judge:
      type: regex
      expr: "Session .* created"
    timeout: 15

  - name: "提取 session ID"
    command: "export SID=$(sumeru session list | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID"
    judge:
      type: regex
      expr: "ses_"

  # ─── session get 确认 project 字段 ───

  - command: "sumeru session get $SID --format json 2>&1 | jq -r '.value.project'"
    judge:
      type: regex
      expr: "^atest-project$"

  # ─── 等待 agent 读取项目文件并回复 ───

  - command: "sleep 5 && sumeru session turns $SID 2>&1 | tail -20"
    judge:
      type: regex
      expr: "OMEGA-5599"
    retry:
      max: 5
      interval: 5
      backoff: false

  # ─── 验证 cwd 是 /workspace ───

  - command: "sumeru session send $SID 'Run pwd and tell me the current directory path' 2>&1"
    judge:
      type: regex
      expr: "accepted"

  - command: "sleep 5 && sumeru session turns $SID 2>&1 | tail -20"
    judge:
      type: regex
      expr: "/workspace"
    retry:
      max: 5
      interval: 5
      backoff: false
