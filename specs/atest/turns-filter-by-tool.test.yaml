name: turns-filter-by-tool
description: Test turns filtering by tool type (5.2)

setup:
  - "sumeru prototype add test-turns-tool --model qwen3.7-max --adapter sarsapa 2>/dev/null || true"

teardown:
  - "sumeru session rm $SID 2>/dev/null || true"
  - "sumeru prototype rm test-turns-tool 2>/dev/null || true"

steps:
  - name: "5.2: 创建 session"
    command: "export SID=$(sumeru session add test-turns-tool 2>&1 | grep -o 'ses_[A-Z0-9]*' | head -1) && echo $SID"
    expect: "ses_"

  - name: "5.2: 发送触发工具调用的消息"
    command: "sumeru session send $SID 'What is 25 multiplied by 4? Use the calculator tool.' 2>&1"
    expect: "Message sent"

  - name: "5.2: 等待 assistant 回复"
    command: "sleep 15 && sumeru session turns $SID 2>&1 | head -30"
    expect: "100"

  - name: "5.2: 验证 turns 包含 tool calls"
    command: "sumeru session turns $SID 2>&1"
    expect: "→"

  - name: "5.2: 验证 tool call 格式"
    command: "sumeru session turns $SID 2>&1"
    expect: "calculator"
