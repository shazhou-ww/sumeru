suite: docker-worker-e2e
description: |
  Docker worker 全生命周期走查。
  需要: Docker daemon + hermes copilot bridge (port 4142) + socat 转发 (4143)。
  验证 S7 (Worker instance lifecycle) + 部分 S3 (SSE pipe) + S5 (adapter contract)。

prerequisites:
  - hermes copilot bridge running on 127.0.0.1:4142
  - socat TCP-LISTEN:4143,fork,reuseaddr TCP:127.0.0.1:4142
  - docker daemon accessible
  - sumeru/claude-code:dev image built

scenarios:
  - host/worker-create-blocks-until-ready.md
  - host/worker-inbox-outbox-roundtrip.md
  - host/worker-warm-second-message.md
  - host/worker-reset-reinit.md
  - host/worker-delete-compose-down.md
  - host/worker-max-instances-limit.md
