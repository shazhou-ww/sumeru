suite: e2e
description: 端到端主干流程 — 覆盖 session 创建、命令、错误路径、CRUD、turns、restart
prerequisites:
  - Sumeru host running
  - sumeru/sarsapa:dev image built
  - LLM endpoint reachable from container
  - SQLite seeded with Provider + Model + Persona

scenarios:
  - atest/session-lifecycle.test.yaml
  - atest/session-create-no-task.test.yaml
  - atest/session-delete-running.test.yaml
  - atest/session-commands.test.yaml
  - atest/error-paths.test.yaml
  - atest/prototype-crud.test.yaml
  - atest/provider-crud.test.yaml
  - atest/model-crud.test.yaml
  - atest/persona-crud.test.yaml
  - atest/adapter-list.test.yaml
  - atest/turns-pagination.test.yaml
  - atest/resume-after-restart.test.yaml
  - atest/snapshot-inherit-sarsapa.test.yaml
  - atest/snapshot-inherit-hermes.test.yaml
