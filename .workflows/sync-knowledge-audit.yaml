version: 1
name: "sync-knowledge-audit"
description: "Full knowledge audit ‚Äî bidirectional scan of card‚Üícode validity and code‚Üícard coverage. Produces/revises cards through a writer‚Üîreviewer loop. No scanner needed (audits everything, not just recent changes)."
roles:
  auditor:
    description: "Full bidirectional scan: card‚Üícode validity and code‚Üícard coverage"
    goal: "You perform a comprehensive audit of knowledge cards. Check both directions: do existing cards still accurately describe the code (card‚Üícode), and does all significant code have card coverage (code‚Üícard). Produce a todo list of items to fix."
    capabilities:
      - coding
    procedure: |
      You perform a full bidirectional knowledge audit. Unlike the catchup workflow (which only looks at recent changes), you examine EVERYTHING.

      **Step 1 ‚Äî Card‚ÜíCode check (are existing cards still valid?):**
      1. List all existing cards: `find cards/ -name "*.md" 2>/dev/null`
      2. For each card:
         a. Read its frontmatter `sources:` field
         b. Check if each source file still exists
         c. If the source exists, check if the card description still matches the actual code
         d. Flag cards where:
            - Source files were deleted (card is orphaned)
            - Source files changed significantly since card was last updated
            - Card descriptions are factually inaccurate

      **Step 2 ‚Äî Code‚ÜíCard check (is there missing coverage?):**
      1. List significant code files (skip test files, configs, lockfiles):
         ```bash
         find src/ lib/ -name "*.ts" -o -name "*.js" | grep -v "\.test\." | grep -v "node_modules"
         ```
         (Adapt paths to the actual project structure)
      2. For each significant code file, check if any card lists it in `sources:`
      3. Flag files with no card coverage that appear to contain important architecture/behavior

      **Step 3 ‚Äî Build the topic checklist:**
      For each identified issue, create a todo item:
      - `topic`: description of what needs to be done
      - `action`: "create" (missing coverage) | "update" (stale card) | "archive" (orphaned card)
      - `sources`: relevant code files
      - `card`: existing card path or suggested new path
      - `status`: "pending"
      - `feedback`: ""

      **Step 4 ‚Äî Write the todo list file:**
      Write to `.knowledge-sync-todo.yaml`:
      ```yaml
      # Auto-generated by sync-knowledge-audit auditor
      # Do not edit manually ‚Äî managed by the writer‚Üîreviewer loop
      items:
        - topic: "..."
          action: update
          sources: [src/foo.ts]
          card: cards/foo.md
          status: pending
          feedback: ""
      ```

      **Step 5 ‚Äî Output:**
      Report findings and output `$status: todo_ready` with item count.

    output: "Report audit findings. Set $status to todo_ready with itemCount."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "todo_ready" }
            itemCount: { type: integer }
            todoFile: { type: string }
          required: [$status, itemCount, todoFile]

  writer:
    description: "Processes one todo item per turn ‚Äî writes/updates a card, then routes to reviewer or completer"
    goal: "You control the inner loop. Each turn: read the todo list, pick one pending item, write or update the card, then route to reviewer. When all items are done, route to completer."
    capabilities:
      - coding
    procedure: |
      You are the loop controller. Each turn you process exactly ONE card.

      **Step 1 ‚Äî Read the todo list:**
      ```bash
      cat .knowledge-sync-todo.yaml
      ```

      **Step 2 ‚Äî Check for pending items:**
      Parse the YAML and count items where `status` is `pending` or `needs_revision`.
      Items with `status: done` are FINISHED ‚Äî skip them entirely, do NOT re-process them.

      CRITICAL DECISION POINT:
      - Count how many items have status `pending` or `needs_revision`
      - If that count is ZERO ‚Üí you MUST output `$status: all_done`. Do NOT pick any item. Do NOT output `needs_review`.
      - If that count is greater than zero ‚Üí pick the FIRST `pending` or `needs_revision` item and continue to Step 3.

      **Step 3 ‚Äî Write or update the card:**
      For the selected item:
      1. Read the source files listed in `sources`
      2. If action is "create": write a new card at the specified path
      3. If action is "update" or status is "needs_revision": read existing card, revise based on source code and any feedback
      4. If action is "archive": move the card to `cards/.archive/` or delete it
      5. Card format:
         ```markdown
         ---
         id: short-kebab-case-id
         title: "..."
         sources:
           - src/path/to/file.ts
           - src/path/to/other.ts
         tags: [architecture, relevant-tag]
         created: YYYY-MM-DD
         updated: YYYY-MM-DD
         ---

         # Title

         ... card content describing the architecture/behavior ...
         ```

      **Step 4 ‚Äî Output:**
      Report which card you wrote and output `$status: needs_review` with the card path and the todo item topic.

      IMPORTANT: Process only ONE item per turn. The reviewer will validate it, and you'll be called again for the next item.

    output: "Report which card was written. Set $status to needs_review (one card written, route to reviewer) or all_done (no pending items, route to completer)."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "needs_review" }
            cardPath: { type: string }
            topic: { type: string }
          required: [$status, cardPath, topic]
        - properties:
            $status: { const: "all_done" }
            summary: { type: string }
          required: [$status, summary]

  reviewer:
    description: "Validates a written card against source code and updates todo list status"
    goal: "You review a card written by the writer. Verify accuracy against the actual source code, then update the todo list status. You always route back to writer regardless of pass/fail."
    capabilities:
      - code-review
    procedure: |
      You receive a card path and topic from the writer.

      **Step 1 ‚Äî Read the card:**
      ```bash
      cat <cardPath>
      ```

      **Step 2 ‚Äî Validate against sources:**
      1. Read each file listed in the card's `sources:` frontmatter
      2. Check:
         - Do the source files actually exist?
         - Does the card description accurately reflect the current code?
         - Are there any factual errors or outdated descriptions?
         - Is the card well-structured and useful?

      **Step 3 ‚Äî Update the todo list:**
      Read `.knowledge-sync-todo.yaml` and update the item matching this topic:

      - If the card PASSES review:
        - Set `status: done`
        - Set `feedback: ""`
      - If the card NEEDS REVISION:
        - Set `status: needs_revision`
        - Set `feedback: "<specific issues that need fixing>"`

      Write the updated todo list back to `.knowledge-sync-todo.yaml`.

      **Step 4 ‚Äî Output:**
      Always output `$status: reviewed` ‚Äî routing goes back to writer regardless.
      The writer will check the todo list and either fix the card or move on.

    output: "Report review result. Always set $status to reviewed (routes back to writer)."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "reviewed" }
            verdict: { type: string, enum: [pass, needs_revision] }
            cardPath: { type: string }
            feedback: { type: string }
          required: [$status, verdict, cardPath]

  completer:
    description: "Commits cards changes, creates a PR, and cleans up"
    goal: "You summarize what was accomplished, commit the card changes to a new branch, push and create a PR, then clean up the temporary todo list file."
    capabilities: []
    procedure: |
      The writer has determined all items are complete.

      **Step 1 ‚Äî Read final state:**
      ```bash
      cat .knowledge-sync-todo.yaml
      ```
      Count how many items were completed (status: done).

      **Step 2 ‚Äî Summarize:**
      Create a summary of:
      - Total cards created/updated/archived
      - List of card paths produced or modified
      - Coverage gaps that remain (if any)

      **Step 3 ‚Äî Create branch and commit:**
      ```bash
      DATE=$(date +%Y%m%d)
      BRANCH="chore/audit-cards-${DATE}"
      git checkout -b "$BRANCH"
      git add cards/
      git commit -m "chore: knowledge audit ($(date +%Y-%m-%d))

      <list of cards created/updated/archived>"
      ```

      **Step 4 ‚Äî Push and create PR:**
      ```bash
      git push -u origin "$BRANCH"
      tea pr create -t "chore: knowledge audit ($(date +%Y-%m-%d))" \
        -d "## What
      Full knowledge audit ‚Äî bidirectional card‚Üîcode sync.

      ## Cards Updated
      <list of cards with action taken>

      ## Generated by
      sync-knowledge-audit workflow"
      ```
      Capture the PR URL from the tea output.

      **Step 5 ‚Äî Clean up:**
      ```bash
      rm .knowledge-sync-todo.yaml
      ```

      **Step 6 ‚Äî Output:**
      Output `$status: complete` with the summary and PR URL.

    output: "Summary of audit run with PR URL. Set $status to complete (routes to $END)."
    frontmatter:
      oneOf:
        - properties:
            $status: { const: "complete" }
            summary: { type: string }
            cardsProduced: { type: integer }
            prUrl: { type: string }
          required: [$status, summary, cardsProduced]

graph:
  $START:
    new: { role: "auditor", prompt: "Perform a full bidirectional knowledge audit: card‚Üícode validity and code‚Üícard coverage." }
    resume: { role: "auditor", prompt: "Re-run the full bidirectional knowledge audit." }
  auditor:
    todo_ready: { role: "writer", prompt: "Todo list ready at {{ todoFile }} with {{ itemCount }} items. Process the first pending item." }
  writer:
    needs_review: { role: "reviewer", prompt: "Review the card at {{ cardPath }} (topic: {{ topic }}). Validate against source code and update the todo list." }
    all_done: { role: "completer", prompt: "All items processed. Summarize and clean up. Summary so far: {{ summary }}" }
  reviewer:
    reviewed: { role: "writer", prompt: "Review complete ({{ verdict }}). Check the todo list: if ALL items have status 'done', output $status: all_done. Otherwise process the next pending/needs_revision item." }
  completer:
    complete: { role: "$END", prompt: "Audit complete. {{ summary }}" }
