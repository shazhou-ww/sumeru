name: first-uwf-usage
description: >
  新用户首次使用 uwf。没有预装任何 skill 或 memory，
  从零开始摸索工具，创建 workflow 并执行。

tools:
  - uwf
  - git
  - node

knowledge:
  skills: []
  memory: []

task: |
  你是一个开发者 agent，刚接到一个新的开发环境。
  你的工作目录在 ~/repos/sample-project。
  
  请使用 uwf 工具完成以下任务：
  1. 了解 uwf 是什么、怎么用
  2. 完成 uwf 的初始化设置
  3. 创建一个 code-review workflow
  4. 成功执行一次 workflow
