name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ocas (cross-repo dependency)
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.GITEA_TOKEN }}@git.shazhou.work/shazhou/ocas.git ../ocas

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable && pnpm install

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run check

      - name: Test
        run: pnpm run test:ci
