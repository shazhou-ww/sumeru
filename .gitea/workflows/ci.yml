name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Checkout and build ocas/cli-kit
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@git.shazhou.work/shazhou/ocas.git ../ocas
          cd ../ocas/packages/cli-kit && npm install && npm install -D typescript && npx tsc

      - run: corepack enable && pnpm install

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run check

      - name: Test
        run: pnpm run test:ci
