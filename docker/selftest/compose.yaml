services:
  agent:
    image: sumeru/selftest:dev
    mem_limit: 8g
    cpus: 2
    volumes:
      # Project path (bind mount — host and container see same absolute path)
      - "${SUMERU_PROJECT_PATH}:${SUMERU_PROJECT_PATH}"
      # Shared caches
      - "${SUMERU_HOST_ROOT:-/tmp/sumeru-e2e-231}/cache/pnpm-store:/cache/pnpm-store"
      - "${SUMERU_HOST_ROOT:-/tmp/sumeru-e2e-231}/cache/npm:/cache/npm"
      - "${SUMERU_HOST_ROOT:-/tmp/sumeru-e2e-231}/cache/uv:/cache/uv"
      - "${SUMERU_HOST_ROOT:-/tmp/sumeru-e2e-231}/cache/pip:/cache/pip"
    environment:
      - COPILOT_BRIDGE_API_KEY=${COPILOT_BRIDGE_API_KEY}
      - GITEA_ADMIN_TOKEN=${GITEA_ADMIN_TOKEN}
      - SUMERU_HOST_URL=http://127.0.0.1:7905
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    network_mode: host
